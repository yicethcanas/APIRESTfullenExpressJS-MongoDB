services:

  mongo:
    image: mongo:7
    container_name: mongo-festivos
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: festivos
    restart: unless-stopped

  express-api:
    build: .
    container_name: express-festivos
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017/festivos
      PORT: 8080
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo-data:
